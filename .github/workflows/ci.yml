name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ApprovalFlow.sln

      - name: Build
        run: dotnet build ApprovalFlow.sln --no-restore --configuration Release

      - name: Test - Intake
        run: dotnet test src/services/intake/ApprovalFlow.Intake.Tests/ApprovalFlow.Intake.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test - AiDecision
        run: dotnet test src/services/ai-decision/ApprovalFlow.AiDecision.Tests/ApprovalFlow.AiDecision.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test - Approval
        run: dotnet test src/services/approval/ApprovalFlow.Approval.Tests/ApprovalFlow.Approval.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test - Payment
        run: dotnet test src/services/payment/ApprovalFlow.Payment.Tests/ApprovalFlow.Payment.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test - Notification
        run: dotnet test src/services/notification/ApprovalFlow.Notification.Tests/ApprovalFlow.Notification.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test - ConfigPolicy
        run: dotnet test src/services/config-policy/ApprovalFlow.ConfigPolicy.Tests/ApprovalFlow.ConfigPolicy.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Build Docker images
        run: docker compose build

      - name: Start stack (docker compose up --wait)
        run: |
          set -euo pipefail
          # `secrets-bootstrap` is a one-shot init container (defined on main). `docker compose up --wait`
          # returns non-zero when any service transitions to "exited" during its wait window — even when
          # that exit is the expected outcome of a service_completed_successfully dependency
          # (docker/compose#10596). Run the bootstrap to completion first, then wait only on the
          # long-running services.
          if docker compose config --services | grep -Fxq secrets-bootstrap; then
            docker compose up -d secrets-bootstrap
            docker compose wait secrets-bootstrap
            long_running=$(docker compose config --services | grep -Fxv secrets-bootstrap | xargs)
          else
            long_running=$(docker compose config --services | xargs)
          fi
          docker compose up -d --wait --wait-timeout 300 $long_running

      - name: Test - E2E
        run: dotnet test tests/ApprovalFlow.E2E/ApprovalFlow.E2E.csproj --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed" --logger "trx;LogFileName=e2e-results.trx"

      - name: Dump compose logs on failure
        if: failure()
        run: |
         echo "=== Docker containers ==="
         docker compose ps

         echo "=== E2E test artifacts ==="
         find . -name "*.trx" -print

         echo "=== E2E trx content ==="
         find . -name "*.trx" -print -exec cat {} \;

         echo "=== Compose logs ==="
         docker compose logs

         echo "=== Placement logs ==="
         docker compose logs placement

         echo "=== Scheduler logs ==="
         docker compose logs scheduler

         echo "=== Gateway logs ==="
         docker compose logs gateway

         echo "=== Intake logs ==="
         docker compose logs intake

         echo "=== Approval logs ==="
         docker compose logs approval

         echo "=== Notification logs ==="
         docker compose logs notification

         echo "=== AI Decision logs ==="
         docker compose logs ai-decision

         echo "=== Payment logs ==="
         docker compose logs payment

         echo "=== Config-Policy logs ==="
         docker compose logs config-policy

      - name: Upload E2E results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: "**/e2e-results.trx"

      - name: Tear down stack
        if: always()
        run: docker compose down -v
