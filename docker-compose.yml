      - -log-level
      - info
    network_mode: "service:config-policy"
    depends_on:
      config-policy:
        condition: service_started
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  scheduler_data:
