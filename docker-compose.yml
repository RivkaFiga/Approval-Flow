x-dapr-common: &dapr-common
  image: daprio/daprd:1.14.4
  volumes:
    - ./dapr/components:/dapr/components
    - ./dapr/configs:/dapr/configs
    - ./dapr/secrets:/run/secrets
  depends_on:
    placement:
      condition: service_started
    scheduler:
      condition: service_started
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    secrets-bootstrap:
      condition: service_completed_successfully

x-service-common: &service-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    ASPNETCORE_ENVIRONMENT: Development
    ASPNETCORE_URLS: http://+:8080
    OpenTelemetry__OtlpEndpoint: ""
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    placement:
      condition: service_started
    scheduler:
      condition: service_started

services:
  # ---------- One-shot bootstrap ----------
  # Materializes dapr/secrets/secrets.json from secrets.example.json if the
  # runtime file is absent. Keeps `docker compose up` working out-of-the-box
  # without committing real secret values. Operators override individual
  # entries via env vars picked up by the approvalflow-secretstore-env
  # component (or replace the file entirely with real secrets).
  secrets-bootstrap:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -f /run/secrets/secrets.json ]; then
          echo "[secrets-bootstrap] secrets.json missing — copying from secrets.example.json";
          cp /run/secrets/secrets.example.json /run/secrets/secrets.json;
        else
          echo "[secrets-bootstrap] secrets.json already present — leaving untouched";
        fi
    volumes:
      - ./dapr/secrets:/run/secrets

  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: approvalflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d approvalflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: approvalflow
      RABBITMQ_DEFAULT_PASS: approvalflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ---------- Dapr control plane ----------
  # Note: no healthcheck — the daprio/dapr image is distroless (no bash, no /dev/tcp, no nc), so
  # container-side probes aren't feasible. Sidecars depend on service_started; daprd retries its
  # placement/scheduler connections internally, so a brief startup race is handled by Dapr.
  placement:
    image: daprio/dapr:1.14.4
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  scheduler:
    image: daprio/dapr:1.14.4
    user: root
    command:
      - ./scheduler
      - --port
      - "50007"
      - --etcd-data-dir
      - /var/lock/dapr/scheduler
    ports:
      - "50007:50007"
    volumes:
      - scheduler_data:/var/lock/dapr/scheduler

  # ---------- Gateway ----------
  gateway:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/gateway/ApprovalFlow.Gateway
        PROJECT_NAME: ApprovalFlow.Gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__OtlpEndpoint: ""
      # JWT settings: values are injected via environment at runtime rather
      # than baked into images. Defaults keep local dev / E2E working; operators
      # override GATEWAY_JWT_SIGNING_KEY (and issuer/audience) via shell env or
      # a Docker secret when running elsewhere.
      Jwt__Issuer:     "${GATEWAY_JWT_ISSUER:-approvalflow-dev}"
      Jwt__Audience:   "${GATEWAY_JWT_AUDIENCE:-approvalflow-gateway}"
      Jwt__SigningKey: "${GATEWAY_JWT_SIGNING_KEY:-development-signing-key-please-override-in-production-32bytes+}"
    ports:
      - "5100:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz && curl -fsS http://localhost:3500/v1.0/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  gateway-dapr:
    <<: *dapr-common
    command:
      - ./daprd
      - -app-id
      - gateway
      - -app-port
      - "8080"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -placement-host-address
      - "placement:50006"
      - -scheduler-host-address
      - "scheduler:50007"
      - -components-path
      - /dapr/components
      - -config
      - /dapr/configs/gateway.yaml
      - -log-level
      - info
    network_mode: "service:gateway"
    depends_on:
      gateway:
        condition: service_started
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- Intake ----------
  intake:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/services/intake/ApprovalFlow.Intake.Api
        PROJECT_NAME: ApprovalFlow.Intake.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__OtlpEndpoint: ""
      ConnectionStrings__IntakeDb: "Host=postgres;Port=5432;Database=approvalflow;Username=postgres;Password=postgres"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz && curl -fsS http://localhost:3500/v1.0/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  intake-dapr:
    <<: *dapr-common
    command:
      - ./daprd
      - -app-id
      - intake
      - -app-port
      - "8080"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -placement-host-address
      - "placement:50006"
      - -scheduler-host-address
      - "scheduler:50007"
      - -components-path
      - /dapr/components
      - -config
      - /dapr/configs/intake.yaml
      - -log-level
      - info
    network_mode: "service:intake"
    depends_on:
      intake:
        condition: service_started
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- AI-Decision ----------
  ai-decision:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/services/ai-decision/ApprovalFlow.AiDecision.Api
        PROJECT_NAME: ApprovalFlow.AiDecision.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__OtlpEndpoint: ""
      ConnectionStrings__AiDecisionDb: "Host=postgres;Port=5432;Database=approvalflow;Username=postgres;Password=postgres"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz && curl -fsS http://localhost:3500/v1.0/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  ai-decision-dapr:
    <<: *dapr-common
    command:
      - ./daprd
      - -app-id
      - ai-decision
      - -app-port
      - "8080"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -placement-host-address
      - "placement:50006"
      - -scheduler-host-address
      - "scheduler:50007"
      - -components-path
      - /dapr/components
      - -config
      - /dapr/configs/ai-decision.yaml
      - -log-level
      - info
    network_mode: "service:ai-decision"
    depends_on:
      ai-decision:
        condition: service_started
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- Approval (Dapr Workflow host) ----------
  approval:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/services/approval/ApprovalFlow.Approval.Api
        PROJECT_NAME: ApprovalFlow.Approval.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__OtlpEndpoint: ""
      ConnectionStrings__ApprovalDb: "Host=postgres;Port=5432;Database=approvalflow;Username=postgres;Password=postgres"
    ports:
     - "5102:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz && curl -fsS http://localhost:3500/v1.0/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  approval-dapr:
    <<: *dapr-common
    command:
      - ./daprd
      - -app-id
      - approval
      - -app-port
      - "8080"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -placement-host-address
      - "placement:50006"
      - -scheduler-host-address
      - "scheduler:50007"
      - -components-path
      - /dapr/components
      - -config
      - /dapr/configs/approval.yaml
      - -log-level
      - info
    network_mode: "service:approval"
    depends_on:
      approval:
        condition: service_started
      placement:
        condition: service_started
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- Payment ----------
  payment:
    <<: *service-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_PATH: src/services/payment/ApprovalFlow.Payment.Api
        PROJECT_NAME: ApprovalFlow.Payment.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OpenTelemetry__OtlpEndpoint: ""
      ConnectionStrings__PaymentDb: "Host=postgres;Port=5432;Database=approvalflow;Username=postgres;Password=postgres"
    healthcheck:
