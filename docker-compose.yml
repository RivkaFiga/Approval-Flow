      - -app-port
      - "8080"
      - -dapr-http-port
      - "3500"
      - -dapr-grpc-port
      - "50001"
      - -placement-host-address
      - "placement:50006"
      - -scheduler-host-address
      - "scheduler:50007"
      - -components-path
      - /dapr/components
      - -config
