apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: approvalflow-pubsub
spec:
  type: pubsub.rabbitmq
  version: v1
  metadata:
    - name: connectionString
      value: "amqp://approvalflow:approvalflow@rabbitmq:5672/"
    - name: protocol
      value: "amqp"
    - name: hostname
      value: "rabbitmq"
    - name: durable
      value: "true"
    - name: deletedWhenUnused
      value: "false"
    - name: autoAck
      value: "false"
    - name: reconnectWait
      value: "5"
    - name: concurrency
      value: "parallel"
    - name: prefetchCount
      value: "10"
    - name: publisherConfirm
      value: "true"
