apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: approvalflow-secretstore-env
spec:
  # Reads secrets from environment variables of the sidecar process. Provides
  # a runtime-injection path so operators can supply secrets via env vars
  # (docker-compose, systemd, Kubernetes secretKeyRef, etc.) without ever
  # committing them to git. Use secretRef references in components (e.g.,
  # pubsub connection strings) to pull values from here in non-dev environments.
  type: secretstores.local.env
  version: v1
  metadata: []
